<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Academy</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.7.0/dist/tabler-icons.min.css">
<style>
  :root{
    --ink:#1A1A1A; --muted:#6B6B6B; --faint:#9A9A9A;
    --brand:#4A9CAD; --brand-soft:#EAF4F6; --brand-line:#CDE6EB;
    --accent:#F4C43C; --accent-2:#E5A800; --accent-soft:#FDF3D6; --accent-line:#F2DE9A; --accent-ink:#6E5000;
    --tealdark:#164852; --tealmid:#2E7D8A; --teallite:#57A9B7;
    --bg:#FFFFFF; --card:#FFFFFF; --line:#ECEEEF; --line2:#E0E4E6;
    --green:#1D7A5A; --green-soft:#E4F2EC; --amber:#A9701A; --amber-soft:#F8EEDC;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased}
  a{color:inherit}
  button{font-family:inherit;cursor:pointer}
  input{font-family:inherit}
  .hide{display:none!important}
  /* Auth */
  .auth{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:#FAFAFB}
  .auth .box{width:100%;max-width:390px;background:var(--card);border:1px solid var(--line);border-radius:18px;padding:34px 32px;box-shadow:0 12px 44px rgba(16,24,40,.08)}
  .logo{width:46px;height:46px;border-radius:12px;background:var(--brand);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:22px;margin:0 auto 14px}
  .auth h1{font-size:22px;font-weight:600;text-align:center;margin:0 0 4px;letter-spacing:-.01em}
  .auth p.sub{color:var(--muted);font-size:13px;text-align:center;margin:0 0 22px}
  label{display:block;font-size:13px;font-weight:500;margin:0 0 6px}
  input[type=email],input[type=password],input[type=text]{width:100%;padding:11px 13px;border:1px solid var(--line2);border-radius:9px;font-size:15px;margin-bottom:14px;background:var(--card);color:var(--ink)}
  input:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-soft)}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:11px 16px;border-radius:9px;border:1px solid var(--line2);background:var(--card);font-size:14px;font-weight:500;color:var(--ink)}
  .btn:hover{background:var(--bg)}
  .btn.pri{background:var(--brand);border-color:var(--brand);color:#fff;width:100%}
  .btn.pri:hover{background:#3E8493}
  .auth .toggle{text-align:center;font-size:13px;color:var(--muted);margin-top:16px}
  .auth .toggle b{color:var(--brand);cursor:pointer}
  .msg{font-size:13px;padding:9px 12px;border-radius:8px;margin-bottom:14px}
  .msg.err{background:#FCEBEB;color:#A32D2D}
  .msg.ok{background:var(--green-soft);color:var(--green)}
  /* App shell */
  .app{display:flex;min-height:100vh}
  .side{width:230px;flex-shrink:0;background:var(--card);border-right:1px solid var(--line);display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
  .brand{display:flex;align-items:center;gap:10px;padding:18px;border-bottom:1px solid var(--line)}
  .brand .lg{width:34px;height:34px;border-radius:9px;background:var(--brand);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:17px}
  .brand b{font-size:15px;font-weight:600;display:block;line-height:1.15}
  .brand span{font-size:12px;color:var(--muted)}
  .nav{padding:12px 10px;flex:1;min-height:0;overflow-y:auto;display:flex;flex-direction:column}
  .nav a{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:9px;color:var(--muted);font-size:14px;font-weight:500;margin-bottom:2px;cursor:pointer}
  .nav a:hover{background:var(--bg);color:var(--ink)}
  .nav a.active{background:var(--brand-soft);color:var(--brand)}
  .me{border-top:1px solid var(--line);padding:14px}
  .me .who{font-size:13px;font-weight:500}
  .me .em{font-size:12px;color:var(--faint);margin-bottom:8px;word-break:break-all}
  .main{flex:1;min-width:0}
  .top{padding:22px 28px 0;display:flex;align-items:center;gap:13px}
  .topicon{width:46px;height:46px;border-radius:13px;background:linear-gradient(135deg,#4A9CAD,#2F7C8C);color:#fff;display:flex;align-items:center;justify-content:center;font-size:23px;flex-shrink:0;box-shadow:0 3px 10px rgba(74,156,173,.28)}
  .top h1{font-size:21px;font-weight:600;margin:0 0 2px}
  .top .sub{color:var(--muted);font-size:14px}
  .wrap{padding:18px 28px 50px;max-width:840px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px}
.entrycard{transition:transform .14s ease, box-shadow .14s ease}
.entrycard:hover{transform:translateY(-3px);box-shadow:0 16px 34px rgba(16,24,40,.13)}
.phero{position:relative;overflow:hidden;border-radius:20px;padding:32px 32px 28px;background:linear-gradient(135deg,var(--tealdark) 0%,var(--tealmid) 52%,var(--teallite) 100%);box-shadow:0 16px 38px rgba(20,72,82,.30);margin-bottom:20px}
.phero-in{position:relative;z-index:2}
.phero-eyebrow{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);font-weight:800;margin:0 0 13px}
.phero-title{font-size:34px;line-height:1.05;font-weight:800;letter-spacing:-.02em;color:#fff;margin:0}
.phero-title .hl{color:var(--accent)}
.phero-sub{color:#DCEEF1;font-size:14.5px;margin-top:12px;max-width:470px;line-height:1.5}
.phero-cta{display:inline-flex;align-items:center;gap:9px;margin-top:20px;background:var(--accent);color:#3A2B00;font-weight:800;font-size:13px;padding:11px 20px;border-radius:999px;box-shadow:0 6px 16px rgba(244,196,60,.42);cursor:pointer;border:none;line-height:1}
.phero-cta .pd{width:19px;height:19px;border-radius:50%;background:#3A2B00;color:var(--accent);display:inline-flex;align-items:center;justify-content:center;font-size:10px}
.phero-svg{position:absolute;inset:0;z-index:1;pointer-events:none}
.phero-heart{position:absolute;right:-40px;bottom:-58px;z-index:1;opacity:.10;fill:none;stroke:#fff;stroke-width:1.3;pointer-events:none}
.emedallion{width:56px;height:56px;border-radius:16px;display:flex;align-items:center;justify-content:center;margin-bottom:15px;flex-shrink:0}
.entrygrid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
#pagehero{padding:22px 28px 0;max-width:840px}
@media(max-width:640px){.phero-title{font-size:26px}.phero{padding:24px 20px}.emedallion{width:48px;height:48px}.entrygrid{grid-template-columns:1fr}#pagehero{padding:16px 12px 0}}
  .row{display:flex;align-items:center;gap:14px}
  .pill{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:500;padding:4px 10px;border-radius:999px}

  .bar{height:6px;background:#ECE7E1;border-radius:999px;overflow:hidden}
  .bar > i{display:block;height:100%;background:var(--brand);border-radius:999px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
  .muted{color:var(--muted)} .faint{color:var(--faint)}
  .sec{font-size:11.5px;font-weight:800;color:var(--ink);margin:24px 0 12px;text-transform:uppercase;letter-spacing:.06em;border-left:3px solid var(--brand);padding-left:9px}

  .dot{width:22px;height:22px;border-radius:50%;border:2px solid var(--line2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff}

  .crumb{font-size:13px;color:var(--muted);margin-bottom:14px;cursor:pointer;display:inline-block}
  .crumb:hover{color:var(--brand)}
  .video{aspect-ratio:16/9;background:var(--brand-soft);border:1px solid var(--brand-line);border-radius:12px;display:flex;align-items:center;justify-content:center;color:var(--brand);text-align:center}
  .bar{height:7px} .bar>i{background:var(--brand)}
  .pill.g{font-weight:600}
  .lead{font-size:17px;color:var(--brand);font-weight:500;margin:16px 0 2px;line-height:1.4}
  .lb h4{font-size:15px;font-weight:600;margin:20px 0 7px}
  .lb h4:first-child{margin-top:2px}
  .lb p{margin:0 0 11px;color:#3b3b3b;line-height:1.65;font-size:14.5px}
  .lb ul,.lb ol{margin:4px 0 14px;padding-left:22px;color:#3b3b3b;line-height:1.65;font-size:14.5px}
  .lb blockquote{margin:4px 0 14px;padding:12px 18px;border-left:3px solid var(--brand);background:var(--brand-soft);font-style:italic;border-radius:0 8px 8px 0}
  .badge{text-align:center;width:90px}
  .badge .em{width:62px;height:62px;margin:0 auto;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:27px}
  #fx{position:fixed;inset:0;pointer-events:none;z-index:9998}
  #celebrate{position:fixed;inset:0;display:none;align-items:center;justify-content:center;z-index:9999;pointer-events:none}
  #celebrate .cc{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:24px 32px;text-align:center;box-shadow:0 18px 50px rgba(0,0,0,.18)}
  #celebrate .big{font-size:34px;margin-bottom:6px}
  #celebrate h3{margin:0 0 4px;font-size:18px;font-weight:600}
  .lesson-grid{display:flex;gap:24px;align-items:flex-start}
  .lesson-main{flex:1;min-width:0}
  .lesson-rail{width:250px;flex-shrink:0;position:sticky;top:16px}
  .mtop{display:none} .navscrim{display:none}
  @media(max-width:720px){
    .side{position:fixed;top:0;left:-272px;height:100vh;z-index:60;transition:left .22s ease;box-shadow:2px 0 26px rgba(16,24,40,.22);overflow-y:auto}
    .side .nav{flex:0 0 auto;overflow:visible}
    .side.open{left:0}
    .navscrim{position:fixed;inset:0;background:rgba(16,24,40,.42);z-index:55}
    .navscrim.open{display:block}
    .main{width:100%}
    .mtop{display:flex;align-items:center;gap:12px;padding:10px 14px;border-bottom:1px solid var(--line);position:sticky;top:0;background:rgba(255,255,255,.93);backdrop-filter:blur(8px);z-index:40}
    .mburger{width:40px;height:40px;border:1px solid var(--line2);background:var(--card);border-radius:10px;font-size:21px;display:flex;align-items:center;justify-content:center;color:var(--ink);flex-shrink:0}
    .mtop .mlogo{max-height:64px;max-width:64vw;width:auto;object-fit:contain}
    .mtop .mnm{font-weight:600;font-size:16px}
    .wrap,.top{padding-left:16px;padding-right:16px} .top{padding-top:16px}
    .wrap{max-width:100%!important}
    .mvtext{font-size:16px!important;line-height:1.32!important}
    .lesson-grid{flex-direction:column} .lesson-rail{width:100%;position:static;order:-1}
    .schtabs{overflow-x:auto;-webkit-overflow-scrolling:touch}
  }
  .sched-bar{display:flex;align-items:center;gap:14px;margin-bottom:16px;flex-wrap:wrap}
  .sched-nav{display:flex;gap:6px;align-items:center}
  .sched-actions{display:flex;gap:8px;margin-left:auto}
  .iconbtn{width:34px;height:34px;border:1px solid var(--line2);background:var(--card);border-radius:9px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;color:var(--ink);font-size:17px}
  .iconbtn:hover{background:var(--bg);border-color:var(--brand-line)}
  .metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
  .metric{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:13px 16px;box-shadow:0 1px 2px rgba(0,0,0,.03)}
  .metric .ml{font-size:12.5px;color:var(--muted);display:flex;align-items:center;gap:5px}
  .metric .ml i{font-size:15px}
  .metric .mv{font-size:24px;font-weight:700;margin-top:4px;letter-spacing:-.01em}
  .board{border:1px solid var(--line);border-radius:14px;overflow:hidden;overflow-x:auto;box-shadow:0 1px 3px rgba(0,0,0,.04)}
  .board-grid{display:grid;grid-template-columns:172px repeat(7,minmax(96px,1fr));min-width:780px;font-size:12.5px}
  .bh{padding:11px 5px;text-align:center;color:var(--muted);font-weight:600;border-bottom:1px solid var(--line);background:var(--card)}
  .bh span{display:block;color:var(--faint);font-weight:500;font-size:11px}
  .bh-team{text-align:left;padding-left:14px;position:sticky;left:0;z-index:2}
  .bh-today{color:var(--brand);background:var(--brand-soft)}
  .band{grid-column:1/-1;padding:6px 14px;background:var(--bg);border-bottom:1px solid var(--line);font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--faint)}
  .pcell{padding:9px 12px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:9px;position:sticky;left:0;background:var(--card);z-index:1}
  .av{width:30px;height:30px;border-radius:50%;background:var(--brand-soft);color:var(--brand);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
  .pcell .nm{font-weight:600;font-size:13px;line-height:1.25;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:118px}
  .pcell .mt{color:var(--faint);font-size:11px;display:block}
  .daycell{border-bottom:1px solid var(--line);border-left:1px solid var(--line);padding:3px;min-height:46px}
  .daycell.today{background:var(--brand-soft)}
  .scard{border-radius:7px;padding:4px 7px;margin:2px 0;font-size:11.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;background:var(--brand-soft);color:#0b6a57}
  .scard.train{background:var(--amber-soft);color:var(--amber)}
  .scard .x{float:right;cursor:pointer;opacity:.45;margin-left:4px;font-weight:400}
  .scard .x:hover{opacity:1}
  .bt{padding:9px 5px;text-align:center;font-weight:600;border-top:2px solid var(--line2);font-size:12px}
  .bt-team{text-align:left;padding-left:14px;position:sticky;left:0;background:var(--card);z-index:1}
  .schtabs{display:flex;gap:2px;border-bottom:1px solid var(--line);margin-bottom:18px;overflow-x:auto}
  .schtab{border:none;background:none;padding:10px 15px;font-size:13.5px;font-weight:600;color:var(--muted);border-bottom:2px solid transparent;white-space:nowrap;cursor:pointer;flex-shrink:0;font-family:inherit}
  .schtab:hover{color:var(--ink)}
  .schtab.on{color:var(--brand);border-bottom-color:var(--brand)}
  .wbframe{border:11px solid #CDD4DA;border-radius:18px;background:#fff;padding:22px 20px 26px;box-shadow:0 12px 34px rgba(16,24,40,.13),inset 0 0 0 1px #E7EBEE;position:relative}
  .wbframe::after{content:"";position:absolute;left:50%;bottom:-9px;transform:translateX(-50%);width:120px;height:9px;background:#B9C1C8;border-radius:0 0 8px 8px}
  .avseg{display:inline-flex;border:1px solid var(--line2);border-radius:9px;overflow:hidden;flex-shrink:0}
  .avbtn{padding:6px 12px;font-size:12.5px;font-weight:600;background:var(--card);color:var(--muted);border:none;cursor:pointer;font-family:inherit}
  .avbtn.on{background:#E7F5EC;color:#1B7B3F}
  .avbtn.lim{background:#FBF0DA;color:#B7791F}
  .avbtn.off{background:#FCEBEB;color:#A32D2D}
  .avgrid-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border:1px solid var(--line);border-radius:12px}
  .avgrid{display:grid;grid-template-columns:150px repeat(7,minmax(46px,1fr));min-width:520px}
  .avgh{padding:8px 6px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;color:var(--faint);text-align:center;border-bottom:1px solid var(--line);background:#FAFAFA}
  .avgh.avgh-name{text-align:left;padding-left:12px;position:sticky;left:0;z-index:2;background:#FAFAFA}
  .avgn{display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid var(--line);position:sticky;left:0;background:var(--card);z-index:1}
  .avg{display:flex;align-items:center;justify-content:center;border-bottom:1px solid var(--line);border-left:1px solid var(--line);font-weight:700;font-size:14px;cursor:pointer;position:relative;min-height:40px}
  .avg.on{background:#E7F5EC;color:#1B7B3F}
  .avg.lim{background:#FBF0DA;color:#B7791F;font-size:12px;font-weight:800}
  .avg.off{background:#FBECEC;color:#C05252}
  .avdot{position:absolute;top:5px;right:5px;width:5px;height:5px;border-radius:50%;background:var(--brand)}
  @media(max-width:720px){.wbframe{border-width:8px;border-radius:14px;padding:16px 13px 20px}}
  .otile{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:15px 17px}
  .otile .ol{font-size:12.5px;color:var(--muted);display:flex;align-items:center;gap:6px}
  .otile .ov{font-size:23px;font-weight:700;margin-top:5px;letter-spacing:-.01em}
  @media(max-width:720px){ .metrics{grid-template-columns:repeat(2,1fr)} }
  .calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--line);border:1px solid var(--line);border-radius:12px;overflow:hidden}
  .calhd{background:var(--card);padding:8px 4px;text-align:center;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
  .calcell{background:var(--card);min-height:92px;padding:5px 6px;cursor:pointer;overflow:hidden}
  .calcell.empty{background:var(--bg);cursor:default}
  .calcell:hover{background:var(--bg)}
  .calcell.today .cald{background:var(--brand);color:#fff}
  .calcell.sel{box-shadow:inset 0 0 0 2px var(--brand)}
  .cald{font-size:12px;font-weight:600;width:22px;height:22px;line-height:22px;text-align:center;border-radius:50%;margin-bottom:3px}
  .calchip{font-size:10.5px;background:var(--brand-soft);color:#0b6a57;border-radius:4px;padding:1px 4px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .calmore{font-size:10px;color:var(--faint)}
  @media(max-width:720px){ .calcell{min-height:60px} .calchip{display:none} }
  .nav a{transition:background .13s ease,color .13s ease}
  .nav a i{font-size:18px;width:22px;text-align:center;flex-shrink:0}
  .navgroup{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--faint);padding:15px 12px 5px}
  .navgroup:first-child{padding-top:4px}
  .card{box-shadow:0 1px 2px rgba(16,24,40,.03)}
  .card[onclick]{transition:transform .13s ease,box-shadow .13s ease,border-color .13s ease}
  .card[onclick]:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(16,24,40,.07);border-color:var(--brand-line)}
  .btn{transition:background .13s ease,border-color .13s ease,transform .08s ease}
  .btn:active{transform:scale(.985)}
  .btn.pri{box-shadow:0 1px 2px rgba(16,24,40,.06)}
  .side{box-shadow:1px 0 0 var(--line)}
  .top h1{letter-spacing:-.01em}
  .lesson-row{transition:background .12s ease}
  @media print{
    .side,.navscrim,.schtabs,.sched-nav,.sched-actions,.btn,.iconbtn,.no-print,.top .row{display:none!important}
    .app,.main{display:block!important}
    .wrap{max-width:100%!important;padding:0 6px!important}
    .card{break-inside:avoid;box-shadow:none!important;border:1px solid #ccc!important}
    .print-only{display:block!important}
    body,.app{background:#fff!important}
    .sec{margin-top:12px}
  }
  .print-only{display:none}
</style>
</head>

<div id="celebrate"><div class="cc"><div class="big" id="ceEmoji">🎉</div><h3 id="ceTitle"></h3><div class="muted" id="ceSub"></div></div></div>

<script>
const SUPABASE_URL = "https://wjqcnxnwjqmuzrandgea.supabase.co";
const SUPABASE_KEY = "sb_publishable_DQZclfAnv_MYQJLGcOdzdw_g4vMCiSC";
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const root = document.getElementById("root");

function hexRgb(h){ h=(h||'').replace('#',''); if(h.length===3)h=h.split('').map(c=>c+c).join(''); const n=parseInt(h||'C04A28',16)||12602920; return {r:(n>>16)&255,g:(n>>8)&255,b:n&255}; }

function esc(s){ return (s||"").replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c])); }
function richBody(html){
  try{
    const d=new DOMParser().parseFromString(html,'text/html');
    const root=d.body.querySelector('div')||d.body;
    [...root.querySelectorAll('div')].forEach(dv=>{ if(/Up Next/i.test(dv.textContent) && dv.textContent.length<240) dv.remove(); });
    [...d.body.querySelectorAll('*')].forEach(el=>{ if(el.children.length===0){ const t=(el.textContent||'').trim(); if(t.length<130 && /(·|•)\s*(Module\s*\d+|Example)\s*(·|•)/i.test(t)) el.remove(); } });
    return (d.body.querySelector('div')||d.body).outerHTML;
  }catch(e){ return html; }
}

/* ---------- confetti ---------- */
function confetti(big){
  const c=document.getElementById('fx'),x=c.getContext('2d');
  c.width=innerWidth;c.height=innerHeight;
  const colors=['#C04A28','#1D7A5A','#E0A33A','#3D6FB4','#C9577F']; let parts=[];
  function burst(n){ for(let i=0;i<n;i++)parts.push({x:innerWidth/2+(Math.random()-.5)*170,y:innerHeight/2-20,vx:(Math.random()-.5)*11,vy:Math.random()*-11-3,g:.16,r:Math.random()*7+3,col:colors[(Math.random()*colors.length)|0],rot:Math.random()*6,vr:(Math.random()-.5)*.5,born:0}); }
  burst(big?160:70); if(big){ setTimeout(()=>burst(120),450); setTimeout(()=>burst(110),1000); }
  const LIFE=big?280:160; let t=0;
  (function frame(){ x.clearRect(0,0,c.width,c.height); t++;
    parts.forEach(p=>{p.born++;p.vy+=p.g;p.x+=p.vx;p.y+=p.vy;p.rot+=p.vr;x.save();x.translate(p.x,p.y);x.rotate(p.rot);x.globalAlpha=Math.max(0,1-p.born/LIFE);x.fillStyle=p.col;x.fillRect(-p.r/2,-p.r/2,p.r,p.r*.62);x.restore();});
    parts=parts.filter(p=>p.born<LIFE&&p.y<c.height+50);
    if(t<LIFE+70)requestAnimationFrame(frame); else x.clearRect(0,0,c.width,c.height);
  })();
}
function celebrate(title,sub,big,emoji){
  const o=document.getElementById('celebrate');
  document.getElementById('ceEmoji').textContent=emoji||'🎉';
  document.getElementById('ceTitle').textContent=title;
  document.getElementById('ceSub').textContent=sub||'';
  o.style.display='flex'; confetti(big);
  clearTimeout(window._ce); window._ce=setTimeout(()=>o.style.display='none', big?4200:1900);
}

/* ---------- data ---------- */
async function loadAll(){
  const { data:tracks } = await sb.from("tracks").select("*").order("position");
  const { data:lessons } = await sb.from("lessons").select("*").order("position");
  const { data:prog } = await sb.from("progress").select("lesson_id");
  state.tracks = tracks||[];
  state.lessons = {};
  (lessons||[]).forEach(l=>{ (state.lessons[l.track_id]=state.lessons[l.track_id]||[]).push(l); });
  state.progress = new Set((prog||[]).map(p=>p.lesson_id));
  const { data:resp } = await sb.from("responses").select("lesson_id,text");
  state.responses = {}; (resp||[]).forEach(r=>{ state.responses[r.lesson_id]=r.text; });
  const { data:gl } = await sb.from('glossary').select('*'); state.glossary = gl||[];
  const { data:asg } = await sb.from('assignments').select('*'); state.assignments = asg||[];
}
async function saveResponse(lid, text){
  state.responses[lid]=text;
  await sb.from("responses").upsert({ user_id:state.user.id, lesson_id:lid, text, updated_at:new Date().toISOString() });
}
window.saveJournal = async function(lid){

async function ensureProfile(){
  const { data } = await sb.from("profiles").select("*").eq("id", state.user.id).maybeSingle();
  if(data){ state.profile=data; return; }
  const name = (window._pendingName||'').trim() || state.user.email.split("@")[0];

}
function trackLessons(tid){ return state.lessons[tid]||[]; }
function visibleTracks(){ const admin=state.profile&&state.profile.role==='admin'; const asg=state.assignments||[]; const assigned=new Set(asg.map(a=>a.track_id)); const uid=state.user&&state.user.id; const mine=new Set(asg.filter(a=>a.user_id===uid).map(a=>a.track_id)); return state.tracks.filter(t=>{ if(admin) return true; if(assigned.has(t.id)) return mine.has(t.id); return (t.audience||'all')!=='admin'; }); }
function isDone(lid){ return state.progress.has(lid); }
function trackPct(tid){ const ls=trackLessons(tid); const d=ls.filter(l=>isDone(l.id)).length; return ls.length?Math.round(d/ls.length*100):0; }
function trackDone(tid){ const ls=trackLessons(tid); return ls.length>0 && ls.every(l=>isDone(l.id)); }
async function markDone(tid,lid){
  state.progress.add(lid);
  await sb.from("progress").upsert({ user_id:state.user.id, lesson_id:lid, at:new Date().toISOString() });
  const t=state.tracks.find(x=>x.id===tid);
  if(trackDone(tid)) celebrate(`${t.cert} certified!`, `${state.profile.name} finished ${t.name}.`, true, '🏆');
  else celebrate('Lesson complete','',false,'✓');

function amsg(t,cls){ document.getElementById("amsg").innerHTML=`<div class="msg ${cls}">${esc(t)}</div>`; }
async function submitAuth(){
  if(state.busy) return; state.busy=true;
  const email=document.getElementById("email").value.trim();
  const pass=document.getElementById("pass").value;
  if(!email||!pass){ amsg("Enter your email and password.","err"); state.busy=false; return; }
  document.getElementById("go").textContent="Working…";
  try{
    if(state.authMode==="up"){
      const nm=(document.getElementById('nm')?document.getElementById('nm').value.trim():'');
      const jc=(document.getElementById('jc')?document.getElementById('jc').value.trim():'');
      const need=(state.settings&&state.settings.join_code)||'';
      if(need && jc.toLowerCase()!==need.toLowerCase()){ amsg("That join code isn't right — ask your manager for it.","err"); state.busy=false; document.getElementById("go").textContent="Create account"; return; }
      window._pendingName=nm;
      const { data, error } = await sb.auth.signUp({ email, password:pass });
      if(error){ amsg(error.message,"err"); }
      else if(!data.session){ amsg("Account created. Check your email to confirm, then sign in.","ok"); state.authMode="in"; }
      else { await boot(); return; }
    } else {
      const { error } = await sb.auth.signInWithPassword({ email, password:pass });
      if(error){ amsg(error.message,"err"); } else { await boot(); return; }
    }
  }catch(e){ amsg(e.message,"err"); }
  state.busy=false; if(document.getElementById("go")) document.getElementById("go").textContent = state.authMode==="in"?"Sign in":"Create account";
}

window.toggleWhyEdit=function(){ const e=document.getElementById('whyEdit'); if(e) e.style.display = (e.style.display==='none'?'block':'none'); };

const REM_UNITS={day:'Days',week:'Weeks',month:'Months',year:'Years'};
function remAdvance(iso,n,unit){ const p=String(iso).split('-').map(Number); let dt=new Date(p[0],p[1]-1,p[2]); n=n||1; if(unit==='day')dt.setDate(dt.getDate()+n); else if(unit==='week')dt.setDate(dt.getDate()+7*n); else if(unit==='year')dt.setFullYear(dt.getFullYear()+n); else { const day=dt.getDate(); dt.setDate(1); dt.setMonth(dt.getMonth()+n); const dim=new Date(dt.getFullYear(),dt.getMonth()+1,0).getDate(); dt.setDate(Math.min(day,dim)); } return isoDate(dt); }
function remDue(r,t){ if(r.active===false) return false; if(!r.next_due) return false; return isoDate(t)>=r.next_due; }
function remPrettyDate(iso){ if(!iso) return ''; const p=String(iso).split('-').map(Number); return new Date(p[0],p[1]-1,p[2]).toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'}); }
function remCadenceLabel(r){ const n=r.every_n||1; const u=r.unit||'month'; if(n===1) return ({day:'Daily',week:'Weekly',month:'Monthly',year:'Yearly'})[u]||'Recurring'; return 'Every '+n+' '+(REM_UNITS[u]||'Months').toLowerCase(); }
window.toggleRemPanel=function(){ const e=document.getElementById('remPanel'); if(e) e.style.display=(e.style.display==='none'?'block':'none'); };
window.addReminder=async function(){ const ti=document.getElementById('remTitle'); if(!ti)return; const t=(ti.value||'').trim(); if(!t)return; const n=Math.max(1,parseInt((document.getElementById('remEvery')||{}).value)||1); const u=(document.getElementById('remUnit')||{}).value||'month'; const nd=(document.getElementById('remNext')||{}).value||isoDate(new Date()); await sb.from('reminders').insert({title:t,every_n:n,unit:u,next_due:nd,cadence:u,created_by:state.user.id}); await refreshView(); const p=document.getElementById('remPanel'); if(p)p.style.display='block'; };
window.delReminder=async function(id){ await sb.from('reminders').delete().eq('id',id); await refreshView(); const p=document.getElementById('remPanel'); if(p)p.style.display='block'; };
window.doneReminder=async function(id){ const r=(await sb.from('reminders').select('*').eq('id',id)).data[0]; if(!r)return; const todayIso=isoDate(new Date()); let nd=r.next_due||todayIso; let g=0; do{ nd=remAdvance(nd,r.every_n||1,r.unit||'month'); g++; }while(nd<=todayIso&&g<400); await sb.from('reminders').update({next_due:nd,last_done:todayIso}).eq('id',id); await refreshView(); };
async function loadTodoData(iso,today){ const [rtodo,rrem]=await Promise.all([ sb.from('day_items').select('*').eq('kind','todo').order('created_at'), sb.from('reminders').select('*').order('next_due') ]); const allTodos=(rtodo.data||[]); const todoItems=allTodos.filter(t=>!t.done||t.on_date===iso).sort((a,b)=>((a.done?1:0)-(b.done?1:0))||(a.created_at||'').localeCompare(b.created_at||'')); const todos=allTodos.filter(t=>!t.done); const allRems=(rrem.data||[]); const dueRems=allRems.filter(r=>remDue(r,today)); return {todoItems,todos,allRems,dueRems,openCount:todos.length+dueRems.length}; }
function buildTodoCard(d){ const dueRems=d.dueRems,todoItems=d.todoItems,allRems=d.allRems,openCount=d.openCount;

  const remList=allRems.length?allRems.map(r=>`<div class="row" style="align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--line)"><span style="flex:1;min-width:0;font-size:14px;color:var(--ink)">${esc(r.title||'')}</span><span style="font-size:11.5px;color:var(--muted);flex-shrink:0">${remCadenceLabel(r)}${r.next_due?' · next '+remPrettyDate(r.next_due):''}</span><span onclick="delReminder('${r.id}')" style="cursor:pointer;color:var(--muted);font-size:16px;flex-shrink:0" title="Delete reminder"><i class="ti ti-trash"></i></span></div>`).join(''):`<div class="faint" style="font-size:13px">No reminders yet. Add one below.</div>`;

window.csLearnLabor=function(){
  const v=document.getElementById('view'); if(!v)return;
  const p=t=>`<p style="font-size:15.5px;line-height:1.72;color:var(--ink);margin:0 0 15px">${t}</p>`;
  const hd=t=>`<div style="font-size:12px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--brand);margin:22px 0 10px">${t}</div>`;
  let h=`<div class="row" style="gap:10px;margin-bottom:14px"><button class="btn" style="width:auto;padding:9px 16px" onclick="go('costsmart')"><i class="ti ti-arrow-left"></i> Back to Cost-Smart</button></div><div style="max-width:720px">`;
  h+=`<div style="background:linear-gradient(135deg,var(--tealmid),var(--tealdark));color:#fff;border-radius:16px;padding:20px 22px;margin-bottom:18px"><div style="font-size:11px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);margin-bottom:6px">A short teaching</div><div style="font-size:26px;font-weight:800">The two sides of labor</div><div style="font-size:14px;opacity:.9;margin-top:5px">Why the leanest schedule isn't always the best one.</div></div>`;
  h+=p(`Most people look at labor one way: as a cost to cut. Trim it down, get the number low, feel good. That's half the picture &mdash; and it's the half that gets a lot of good restaurants in trouble.`);
  h+=p(`I look at labor as two different things.`);
  h+=hd('1. The labor you need to run the business');
  h+=p(`This is your schedule &mdash; the people it takes to open, serve, and close well on the sales you have today. This is the side Cost-Smart helps you with. When you're carrying more people than the sales need, that's real waste, and trimming it is money back in your pocket. Get this side tight.`);
  h+=hd('2. The labor you invest to grow');
  h+=p(`This one almost nobody talks about. Sometimes you put an extra person on <b>not</b> because the sales are there today, but because you're trying to grow &mdash; a slow daypart you want to build, or a peak you've been stuck at. On a spreadsheet it looks like waste. It isn't. It's a bet.`);
  h+=p(`Years ago at Chick-fil-A, my 2 to 4 in the afternoon was dead. So I started putting extra people outside on the drive-thru &mdash; not because the volume needed them, but so every car that drove by <b>saw</b> people out there, ready to serve. My team hated it. &ldquo;We don't need these people.&rdquo; The first month and a half was rough, and yes, I was spending labor I wasn't getting back yet.`);
  h+=p(`I kept with it. Month two it started to move. Month three it was growing. By the end of the year that slow afternoon was my <b>fastest-growing</b> part of the day &mdash; not the biggest, but growing faster than anything else &mdash; and it more than paid back every hour of labor I'd put in. That's not a labor cost. That's marketing. It's staffing for the sales you <b>want</b>, not the sales you have.`);
  h+=hd('What this means for Cost-Smart');
  h+=p(`Cost-Smart is very good at side one. It reads your real numbers and shows you where you're carrying more than the sales need. Use it. Trim the true waste &mdash; the hour you're overstaffed for no reason.`);
  h+=p(`But Cost-Smart only sees the cost. It can't see your strategy. It doesn't know the extra person you put on Tuesday afternoon is a bet you're making on purpose. So when it flags an hour, ask one question: <b>is this waste, or is this a bet?</b> Cut the waste. Protect the bets.`);
  h+=hd(`And don't cut too tight`);
  h+=p(`If you're wired like me, you'll want to cut every last thing until the tool says you've got it. Be careful there. Cut too tight and you lose the room to serve well, to grow, to breathe when it gets busy. The best operators I know pull both levers: they cut cost <b>and</b> they invest in growth. One without the other is how you end up efficient and shrinking at the same time.`);
  h+=p(`Run the numbers. Then run the business. That second part is on you &mdash; and it's the fun part.`);
  h+=`<div style="margin-top:8px;padding:14px 16px;border-radius:12px;background:var(--brand-soft);border:1px solid var(--brand-line)"><div style="font-size:13.5px;color:var(--ink);line-height:1.6"><b>Coming soon:</b> a video walkthrough of this, plus a way to mark certain labor as a growth investment so Cost-Smart leaves it alone. For now &mdash; cut the waste, protect the bets.</div></div>`;
  h+=`<div style="margin-top:16px;font-size:14px;color:var(--muted)">&mdash; Jason</div></div>`;
  v.innerHTML=h; window.scrollTo(0,0);
};

async function vSummary(v){

function stripHtml(html){ const d=document.createElement('div'); d.innerHTML=html||''; return (d.textContent||'').replace(/\s+/g,' ').trim(); }
function allLessons(){ const out=[]; Object.keys(state.lessons).forEach(tid=>(state.lessons[tid]||[]).forEach(l=>out.push(l))); return out; }
function askSearch(q){ const terms=q.toLowerCase().split(/\W+/).filter(w=>w.length>2); if(!terms.length)return[]; return allLessons().map(l=>{ const text=(l.title+' '+(l.subtitle||'')+' '+stripHtml(l.body)); const low=text.toLowerCase(); let sc=0; terms.forEach(t=>{ sc+=(low.split(t).length-1)+(l.title.toLowerCase().includes(t)?6:0); }); return {l,sc,text}; }).filter(x=>x.sc>0).sort((a,b)=>b.sc-a.sc).slice(0,4); }
function snippet(text,q){ const terms=q.toLowerCase().split(/\W+/).filter(w=>w.length>2); let idx=-1; for(const t of terms){ idx=text.toLowerCase().indexOf(t); if(idx>=0)break; } if(idx<0)idx=0; const start=Math.max(0,idx-70); return (start>0?'…':'')+text.slice(start,start+210).trim()+'…'; }
function vAsk(v){
  const isAdmin=state.profile&&state.profile.role==='admin';
  setTitle('Ask','Find the answer in your own training — fast');
  let h=`<div class="card" style="padding:16px;margin-bottom:18px"><div class="row" style="gap:8px"><input id="askq" placeholder="How do we open the espresso machine?" value="${esc(state.ctx.q||'')}" onkeydown="if(event.key==='Enter')doAsk()" style="flex:1;padding:11px 13px;border:1px solid var(--line2);border-radius:9px;font-size:14px;background:var(--card);color:var(--ink);font-family:inherit"/><button class="btn pri" style="width:auto" onclick="doAsk()">Ask</button></div><div class="faint" style="font-size:12px;margin-top:8px">Searches every lesson in your academy. Answers come straight from your training — never made up.</div></div><div id="askres"></div>`;
  if(isAdmin) h+=`<div class="sec">Turn a procedure into a lesson</div><div class="card" style="padding:16px"><div class="faint" style="font-size:13px;margin-bottom:8px">Paste how you do something — one step per line. I'll shape it into a lesson draft you can drop into a track.</div><textarea id="proc" placeholder="Pull a double shot&#10;Steam milk to 150°F&#10;…" style="width:100%;min-height:120px;padding:11px;border:1px solid var(--line2);border-radius:9px;font-size:14px;font-family:inherit;line-height:1.6;color:var(--ink);background:var(--card)"></textarea><div class="row" style="margin-top:8px;gap:8px"><input id="proctitle" placeholder="Lesson title (e.g. Opening the Espresso Machine)" style="flex:1;padding:9px 11px;border:1px solid var(--line2);border-radius:8px;background:var(--card);color:var(--ink);font-family:inherit"/><button class="btn pri" style="width:auto" onclick="draftLesson()">Draft it</button></div><div id="draftout"></div></div>`;
  v.innerHTML=h; if(state.ctx.q) doAsk();

async function aiCall(body){ try{ const r=await sb.functions.invoke('ai',{body}); if(r.error) return null; const t=r.data&&r.data.text; if(!t||/^AI error/i.test(t)) return null; return t; }catch(e){ return null; } }
window.doAsk=async function(){ const q=val('askq'); state.ctx.q=q; const box=document.getElementById('askres'); if(!box)return; if(!q){box.innerHTML='';return;} const r=askSearch(q); if(!r.length){ box.innerHTML=`<div class="card" style="padding:18px"><b>No answer found yet.</b><div class="muted" style="font-size:13px;margin-top:6px">Nothing in the training covers that yet. Try different words, ask a leader, or post it in <b onclick="go('community')" style="color:var(--brand);cursor:pointer">Community</b>. If it's something the team needs, add it as a lesson.</div></div>`; return; } const sources=`<div class="sec">From your training</div>`+r.map(x=>{ const t=state.tracks.find(tt=>tt.id===x.l.track_id); return `<div class="card" style="padding:15px;margin-bottom:10px;cursor:pointer" onclick="go('lesson',{tid:'${x.l.track_id}',lid:'${x.l.id}'})"><div class="faint" style="font-size:11px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">${esc(t?t.name:'')}</div><div style="font-weight:600;margin-bottom:5px">${esc(x.l.title)}</div><div class="muted" style="font-size:13px;line-height:1.6">${esc(snippet(x.text,q))}</div><div style="color:var(--brand);font-size:13px;font-weight:500;margin-top:8px">Open lesson →</div></div>`; }).join(''); box.innerHTML=`<div class="card" id="aicard" style="padding:16px;margin-bottom:14px;background:var(--brand-soft);border-color:var(--brand-line)"><div class="faint" style="font-size:11px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">Answer</div><div id="aitext" style="font-size:14px;line-height:1.6;white-space:pre-wrap">Thinking…</div></div>`+sources; const ctx=r.map(x=>x.l.title+': '+x.text.slice(0,1200)).join(' || ').slice(0,6000); const ans=await aiCall({mode:'ask',question:q,context:ctx}); const at=document.getElementById('aitext'); if(at){ if(ans){ at.textContent=ans; } else { const c=document.getElementById('aicard'); if(c) c.remove(); } } };
window.draftLesson=async function(){ const raw=val('proc'); const title=val('proctitle')||'Untitled lesson'; const out=document.getElementById('draftout'); if(!out)return; if(!raw){out.innerHTML='';return;} out.innerHTML='<div class="muted" style="font-size:13px;margin-top:10px">Writing the lesson…</div>'; const _ai=await aiCall({mode:'lesson',title:title,notes:raw}); if(_ai){ window._draft=title+String.fromCharCode(10,10)+_ai; out.innerHTML=`<div class="card" style="padding:15px;margin-top:12px;background:var(--brand-soft);border-color:var(--brand-line)"><div class="faint" style="font-size:11px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Draft lesson — copy into a track</div><div style="font-weight:700;margin-bottom:8px">${esc(title)}</div><div style="font-size:13.5px;line-height:1.7;white-space:pre-wrap;color:#333">${esc(_ai)}</div><button class="btn" style="width:auto;margin-top:12px" onclick="navigator.clipboard&&navigator.clipboard.writeText(window._draft);this.textContent='Copied ✓'">Copy draft</button></div>`; return; } const steps=raw.split(/\n+/).map(s=>s.replace(/^\s*[-*\d.)]+\s*/,'').trim()).filter(Boolean); const check=steps.length?`What's the first thing you do, and why does it matter to the guest?`:'What is the most important step here, and why?'; window._draft=`${title}\n\nWhy it matters: (add one line on why this matters to the guest or the team)\n\nSteps:\n${steps.map((s,i)=>(i+1)+'. '+s).join('\n')}\n\nKnowledge check: ${check}`; out.innerHTML=`<div class="card" style="padding:15px;margin-top:12px;background:var(--brand-soft);border-color:var(--brand-line)"><div class="faint" style="font-size:11px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Draft — copy into a lesson</div><div style="font-weight:700;margin-bottom:6px">${esc(title)}</div><div style="font-size:13px;color:#444;margin-bottom:10px"><i>Why it matters: add one line on why this matters to the guest or the team.</i></div><div style="font-weight:600;font-size:13px;margin-bottom:4px">Steps</div><ol style="margin:0 0 10px 18px;font-size:13.5px;line-height:1.7">${steps.map(s=>'<li>'+esc(s)+'</li>').join('')}</ol><div style="font-weight:600;font-size:13px">Knowledge check</div><div style="font-size:13.5px;color:#444">${esc(check)}</div><button class="btn" style="width:auto;margin-top:12px" onclick="navigator.clipboard&&navigator.clipboard.writeText(window._draft);this.textContent='Copied ✓'">Copy draft</button></div>`; };

/* ---------- glossary linking + term/assignment admin ---------- */
function escapeRe(s){ return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'); }
function linkGlossary(root){
  const terms=(state.glossary||[]).filter(g=>g.term); if(!terms.length||!root)return;
  const scope=root.querySelector('.lesson-main')||root;
  const walker=document.createTreeWalker(scope, NodeFilter.SHOW_TEXT, null); const nodes=[]; let n;
  while(n=walker.nextNode()){ const pn=n.parentNode; if(!pn)continue; if(/^(A|BUTTON|SCRIPT|STYLE|TEXTAREA|H1)$/.test(pn.nodeName))continue; if(pn.classList&&pn.classList.contains('gloss'))continue; nodes.push(n); }
  const seen=new Set();
  terms.forEach(g=>{ const key=g.term.toLowerCase(); if(seen.has(key))return; let re; try{ re=new RegExp('\\b('+escapeRe(g.term)+')\\b','i'); }catch(e){ return; } for(const node of nodes){ const m=node.nodeValue.match(re); if(m){ const after=node.splitText(m.index); after.nodeValue=after.nodeValue.slice(m[0].length); const span=document.createElement('span'); span.className='gloss'; span.textContent=m[0]; span.style.cssText='color:var(--brand);border-bottom:1px dotted var(--brand);cursor:help'; span.title=g.definition||''; span.addEventListener('click',()=>showTerm(g.id)); node.parentNode.insertBefore(span, after); seen.add(key); break; } } });
}

function isoDate(d){ const x=new Date(d); return x.getFullYear()+'-'+String(x.getMonth()+1).padStart(2,'0')+'-'+String(x.getDate()).padStart(2,'0'); }
function weekStart(d){ const x=new Date(d); const off=(x.getDay()+6)%7; x.setDate(x.getDate()-off); x.setHours(0,0,0,0); return x; }
function fmtDay(d){ return new Date(d).toLocaleDateString(undefined,{weekday:'short',month:'numeric',day:'numeric'}); }
function parseClock(t){ if(!t)return null; t=String(t).trim().toLowerCase(); let ap=null; if(/am|a$/.test(t))ap='a'; if(/pm|p$/.test(t))ap='p'; t=t.replace(/[ap]m?$/,'').trim(); let parts=t.split(':'); let hh=parseInt(parts[0]); let mm=parseInt(parts[1]||'0'); if(isNaN(hh))return null; if(ap==='p'&&hh<12)hh+=12; if(ap==='a'&&hh===12)hh=0; return hh+(mm||0)/60; }
function shiftHours(s){ const a=parseClock(s.start_time),b=parseClock(s.end_time); if(a==null||b==null)return 0; let d=b-a; if(d<0)d+=24; return d; }
function fmtClock(t){ const v=parseClock(t); if(v==null)return esc(t||''); let hh=Math.floor(v),mm=Math.round((v-hh)*60); const ap=hh>=12?'p':'a'; let h12=hh%12||12; return h12+(mm?':'+String(mm).padStart(2,'0'):'')+ap; }
function money(n){ return '$'+(Math.round(n*100)/100).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2}); }

/* ---------- Time Clock — shared station; tap your name to clock in/out ---------- */
async function vClock(v){
  if(!canSee(state.page)){ go('home'); return; }
  setTitle('Time Clock','Tap your name to clock in or out');
  v.innerHTML='<div class="muted">Loading…</div>';
  const today=isoDate(new Date());
  const [rp,rsh]=await Promise.all([ sb.from('day_items').select('*').eq('kind','punch').eq('on_date',today), sb.from('shifts').select('*').eq('on_date',today) ]);
  await loadPositions(); await loadArchived();
  const punch={}; (rp.data||[]).forEach(x=>{ let d={}; try{d=JSON.parse(x.detail||'{}');}catch(e){} punch[x.title]={id:x.id,sessions:d.sessions||[]}; });
  window._punch=punch; window._punchDate=today;
  const schBy={}; (rsh.data||[]).forEach(s=>{ if(s.person_name&&s.person_name!=='__OPEN__') (schBy[s.person_name]=schBy[s.person_name]||[]).push(s); });
  const roster=rosterNames().sort((a,b)=>{const ra=POS_ORDER.indexOf(posOf(a)),rb=POS_ORDER.indexOf(posOf(b));return (ra<0?99:ra)-(rb<0?99:rb)||a.localeCompare(b);});
  const now=Date.now();
  const isOn=p=>{ const s=(punch[p]||{}).sessions||[]; return s.length&&!s[s.length-1].out; };
  const elapsed=p=>{ const s=(punch[p]||{}).sessions||[]; let ms=0; s.forEach(x=>{ const a=x.in?new Date(x.in).getTime():0; const b=x.out?new Date(x.out).getTime():now; if(a)ms+=b-a; }); return ms; };
  const fmtDur=ms=>{ const m=Math.max(0,Math.round(ms/60000)); return Math.floor(m/60)+'h '+String(m%60).padStart(2,'0')+'m'; };
  const onCount=roster.filter(isOn).length;
  let h=`<div class="card" style="padding:14px 16px;margin-bottom:14px"><span style="font-size:22px;font-weight:800;color:var(--brand)">${onCount}</span> <span class="faint">on the clock</span> <span class="faint">· ${_d(today).toLocaleDateString(undefined,{weekday:'long',month:'short',day:'numeric'})}</span><div class="faint" style="font-size:11.5px;margin-top:5px">Leave this open on a shared tablet at the counter. Everyone taps their own name.</div></div>`;

  else h+=`<div class="grid" style="grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px">`+roster.map(p=>{ const on=isOn(p); const sch=(schBy[p]||[])[0]; const el=elapsed(p); const nm=esc(p).replace(/'/g,"\\'"); return `<div class="card" style="padding:14px;border-left:4px solid ${on?'#1B7B3F':'var(--line2)'}"><div style="font-weight:700;font-size:15px">${esc(p.split(' ')[0])}</div><div class="faint" style="font-size:12px">${esc(posOf(p))}${sch?` · sched ${fmtClock(sch.start_time)}–${fmtClock(sch.end_time)}`:' · not scheduled'}</div><div style="font-size:12.5px;margin:7px 0;color:${on?'#1B7B3F':'var(--muted)'};font-weight:600">${on?'● On the clock · '+fmtDur(el):(el>0?'Worked '+fmtDur(el)+' today':'Not clocked in')}</div><button class="btn ${on?'':'pri'}" style="width:100%" onclick="clock${on?'Out':'In'}('${nm}')">${on?'Clock out':'Clock in'}</button></div>`; }).join('')+`</div>`;
  v.innerHTML=h;
}

/* ---------- Who's on: live timeline + time off + closed days ---------- */
async function schWhoson(v){
  v.innerHTML='<div class="muted">Loading…</div>';
  const todayIso=isoDate(new Date()); const now=new Date(); const nowH=now.getHours()+now.getMinutes()/60;
  const [rsh,rto]=await Promise.all([ sb.from('shifts').select('*').eq('on_date',todayIso).order('start_time'), sb.from('time_off').select('*').eq('status','approved') ]);
  await loadPositions();
  const shifts=(rsh.data||[]).filter(s=>s.person_name&&s.person_name!=='__OPEN__');
  let mn=24,mx=0; shifts.forEach(s=>{ const a=parseClock(s.start_time),b=parseClock(s.end_time); if(a!=null&&a<mn)mn=a; if(b!=null&&b>mx)mx=b; });
  if(mn>=mx){ mn=6; mx=15; } mn=Math.floor(mn); mx=Math.ceil(mx); const span=Math.max(1,mx-mn);
  const onNow=shifts.filter(s=>{const a=parseClock(s.start_time),b=parseClock(s.end_time); return a!=null&&b!=null&&nowH>=a&&nowH<b;});
  const next=shifts.filter(s=>{const a=parseClock(s.start_time); return a!=null&&a>nowH;}).slice(0,3);
  let h=`<div class="sec">On the floor — ${_d(todayIso).toLocaleDateString(undefined,{weekday:'long',month:'short',day:'numeric'})}</div>`;
  h+=`<div class="card" style="padding:14px 16px;margin-bottom:14px"><span style="font-size:22px;font-weight:800;color:var(--brand)">${onNow.length}</span> <span class="faint">on the clock right now</span>${onNow.length?` — ${onNow.map(s=>esc(s.person_name.split(' ')[0])).join(', ')}`:''}${next.length?`<div class="faint" style="font-size:12.5px;margin-top:6px">Next in: ${next.map(s=>esc(s.person_name.split(' ')[0])+' @'+fmtClock(s.start_time)).join(' · ')}</div>`:''}</div>`;
  if(!shifts.length) h+=`<div class="card" style="padding:22px;text-align:center"><div class="faint">No one scheduled today.</div></div>`;
  else{ const marks=[]; for(let hh=mn;hh<=mx;hh++) marks.push(hh);
    h+=`<div class="card" style="padding:14px 12px 16px;overflow-x:auto"><div style="min-width:520px;position:relative"><div style="position:relative;height:16px;margin-left:96px;border-bottom:1px solid var(--line)">`+marks.map(hh=>`<span style="position:absolute;left:${(hh-mn)/span*100}%;font-size:10px;color:var(--muted);transform:translateX(-50%)">${((hh%12)||12)}${hh<12?'a':'p'}</span>`).join('')+`</div>`;
    shifts.forEach(s=>{ const a=parseClock(s.start_time),b=parseClock(s.end_time); const L=Math.max(0,(a-mn)/span*100), W=Math.max(2,(b-a)/span*100); const isNow=nowH>=a&&nowH<b; const c=POSCOL(posOf(s.person_name)); h+=`<div style="display:flex;align-items:center;height:30px;margin-top:5px"><div style="width:92px;font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding:0 14px 0 2px">${esc(s.person_name.split(' ')[0])}</div><div style="position:relative;flex:1;height:22px;background:var(--bg);border-radius:5px"><div style="position:absolute;left:${L}%;width:${W}%;height:100%;border-radius:5px;background:${isNow?c:c+'59'};display:flex;align-items:center;padding:0 6px;font-size:10px;color:#fff;font-weight:600;white-space:nowrap;overflow:hidden">${fmtClock(s.start_time)}–${fmtClock(s.end_time)}</div></div></div>`; });
    if(nowH>=mn&&nowH<=mx){ h+=`<div style="position:absolute;top:16px;bottom:0;left:calc(96px + ${(nowH-mn)/span*100}% * (100% - 96px) / 100);width:2px;background:#DC2626;pointer-events:none"></div>`; }
    h+=`</div></div>`;
  }
  const horizon=isoDate((()=>{const d=new Date();d.setDate(d.getDate()+14);return d;})());
  const to=(rto.data||[]).filter(t=>(t.end_date||t.start_date)>=todayIso && t.start_date<=horizon).sort((a,b)=>a.start_date.localeCompare(b.start_date));
  h+=`<div class="sec">Time off — next 2 weeks</div>`;
  if(!to.length) h+=`<div class="card" style="padding:16px;text-align:center"><div class="faint">No approved time off coming up.</div></div>`;
  else h+=`<div class="card">`+to.map(t=>`<div class="row" style="padding:10px 15px;border-bottom:1px solid var(--line);gap:10px"><i class="ti ti-plane" style="color:var(--brand)"></i><div style="flex:1"><div style="font-weight:600;font-size:13.5px">${esc(t.person_name)}</div><div class="faint" style="font-size:12px">${esc(fmtDay(_d(t.start_date)))}${t.end_date&&t.end_date!==t.start_date?' – '+esc(fmtDay(_d(t.end_date))):''}${t.reason?' · '+esc(t.reason):''}</div></div></div>`).join('')+`</div>`;
  const y=new Date().getFullYear(); const hols=usHolidays(y).concat(usHolidays(y+1)).filter(x=>x.closed && x.date>=todayIso && x.date<=horizon);
  h+=`<div class="sec">Closed / blocked days — next 2 weeks</div>`;
  if(!hols.length) h+=`<div class="card" style="padding:16px;text-align:center"><div class="faint">No closures in the next two weeks.</div></div>`;
  else h+=`<div class="card">`+hols.map(x=>`<div class="row" style="padding:10px 15px;border-bottom:1px solid var(--line);gap:10px"><i class="ti ti-lock" style="color:#B32D2D"></i><div style="flex:1"><div style="font-weight:600;font-size:13.5px">${esc(x.name)}</div><div class="faint" style="font-size:12px">${esc(fmtDay(_d(x.date)))} · closed</div></div></div>`).join('')+`</div>`;
  v.innerHTML=h;
}

/* ---------- Calendar (deliveries, holidays, events, deep cleans) ---------- */
function nthWeekday(year,month,weekday,n){ const first=new Date(year,month-1,1); const fd=first.getDay(); const day=1+((weekday-fd+7)%7)+(n-1)*7; return new Date(year,month-1,day); }
function lastWeekday(year,month,weekday){ const last=new Date(year,month,0); const ld=last.getDay(); const day=last.getDate()-((ld-weekday+7)%7); return new Date(year,month-1,day); }
function usHolidays(year){ const p=n=>String(n).padStart(2,'0'); const D=(m,day)=>year+'-'+p(m)+'-'+p(day); const W=dt=>dt.getFullYear()+'-'+p(dt.getMonth()+1)+'-'+p(dt.getDate()); return [
  {date:D(1,1),name:"New Year's Day",closed:false},{date:W(nthWeekday(year,1,1,3)),name:"MLK Day",closed:false},{date:D(2,14),name:"Valentine's Day",closed:false},{date:W(nthWeekday(year,2,1,3)),name:"Presidents' Day",closed:false},{date:W(nthWeekday(year,5,0,2)),name:"Mother's Day",closed:false},{date:W(lastWeekday(year,5,1)),name:"Memorial Day",closed:false},{date:W(nthWeekday(year,6,0,3)),name:"Father's Day",closed:false},{date:D(6,19),name:"Juneteenth",closed:false},{date:D(7,4),name:"Independence Day",closed:false},{date:W(nthWeekday(year,9,1,1)),name:"Labor Day",closed:false},{date:D(10,31),name:"Halloween",closed:false},{date:D(11,11),name:"Veterans Day",closed:false},{date:W(nthWeekday(year,11,4,4)),name:"Thanksgiving",closed:true},{date:D(12,24),name:"Christmas Eve",closed:false},{date:D(12,25),name:"Christmas Day",closed:true},{date:D(12,31),name:"New Year's Eve",closed:false}
]; }
const CAL_KINDS={delivery:['🚚','Delivery'],holiday:['🎉','Holiday'],event:['⭐','Event'],rm:['🔧','Repair / maint.'],clean:['🧽','Deep clean'],order:['🛍️','Order'],note:['📝','Note'],task:['📌','Task'],people:['👋','People']};
function monthMeta(ym){ const a=ym.split('-'); const y=+a[0],m=+a[1]; const dim=new Date(y,m,0).getDate(); const first=new Date(y,m-1,1); return {y,m,dim,startDow:(first.getDay()+6)%7}; }
async function vCalendar(v){
  const now=new Date(); const ym=state.ctx.cal||(now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0'));
  const mm=monthMeta(ym); const y=mm.y,m=mm.m,dim=mm.dim,startDow=mm.startDow;
  setTitle('Calendar', new Date(y,m-1,1).toLocaleDateString(undefined,{month:'long',year:'numeric'}));
  const pad=n=>String(n).padStart(2,'0'); const first=y+'-'+pad(m)+'-01'; const last=y+'-'+pad(m)+'-'+pad(dim);
  let data;
  if(state.calCache && state.calCache.ym===ym){ data=state.calCache.data; }
  else { v.innerHTML='<div class="muted">Loading…</div>'; const r=await sb.from('day_items').select('*').gte('on_date',first).lte('on_date',last).order('created_at'); data=r.data||[]; state.calCache={ym,data}; }
  const CAL_HIDE=new Set(['pos','ojr','mission','vision','pool','archived','pdates','profile','covrules','stations','daylog','cltmpl','clrun','actual','punch','hourly']);
  const byd={}; (data||[]).forEach(it=>{ if(CAL_HIDE.has(it.kind))return; (byd[it.on_date]=byd[it.on_date]||[]).push(it); });
  const hol={}; usHolidays(y).forEach(x=>hol[x.date]=x);
  const todayIso=isoDate(new Date()); const sel=state.ctx.day||(ym===todayIso.slice(0,7)?todayIso:first);
  let h=`<div class="sched-bar"><div class="sched-nav"><button class="iconbtn" aria-label="Previous month" onclick="calMonth(-1)"><i class="ti ti-chevron-left"></i></button><button class="iconbtn" aria-label="Next month" onclick="calMonth(1)"><i class="ti ti-chevron-right"></i></button><button class="btn" style="width:auto" onclick="calMonth(0)">This month</button></div><div style="font-size:18px;font-weight:600">${new Date(y,m-1,1).toLocaleDateString(undefined,{month:'long',year:'numeric'})}</div></div>`;
  h+=`<div class="calgrid">`+['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].map(d=>`<div class="calhd">${d}</div>`).join('');
  for(let i=0;i<startDow;i++) h+=`<div class="calcell empty"></div>`;
  for(let d=1;d<=dim;d++){ const iso=y+'-'+pad(m)+'-'+pad(d); const its=byd[iso]||[]; const isT=iso===todayIso; const isS=iso===sel; const hx=hol[iso]; const holChip=hx?`<div class="calchip" style="background:var(--amber-soft);color:var(--amber)">🎉 ${esc(hx.name)}</div>`:'';
    h+=`<div class="calcell${isT?' today':''}${isS?' sel':''}" onclick="calPick('${iso}')"><div class="cald">${d}</div>${holChip}`+its.slice(0,3).map(it=>`<div class="calchip">${(CAL_KINDS[it.kind]||['•'])[0]} ${esc(it.title)}</div>`).join('')+(its.length>3?`<div class="calmore">+${its.length-3} more</div>`:'')+`</div>`;
  }
  h+=`</div>`;
  const selIts=byd[sel]||[]; const selLbl=new Date(sel+'T00:00:00').toLocaleDateString(undefined,{weekday:'long',month:'long',day:'numeric'});
  if(hol[sel]) h+=`<div class="card" style="padding:12px 15px;margin-bottom:10px;background:var(--amber-soft);border-color:var(--amber)"><b style="color:var(--amber)">🎉 ${esc(hol[sel].name)}</b> <span class="muted" style="font-size:13px">${hol[sel].closed?"— closed. End of day: perishables prepped today are waste after close, so don't over-prep.":"— banks and government closed, so expect it busier. Bump prep and staffing."}</span></div>`;
  h+=`<div class="sec">${esc(selLbl)}</div><div class="card">`+(selIts.length?selIts.map(it=>`<div class="lesson-row"><div style="font-size:16px">${(CAL_KINDS[it.kind]||['•'])[0]}</div><div style="flex:1;min-width:0"><div style="font-weight:500;${it.done?'text-decoration:line-through;color:#999':''}">${esc(it.title)}</div>${it.detail?`<div class="faint" style="font-size:12px">${esc(it.detail)}</div>`:''}</div><button class="btn" style="width:auto" onclick="toggleDayItem(${it.id},${it.done?'false':'true'})">${it.done?'✓ Done':'Mark done'}</button><button class="btn" style="width:auto;padding:4px 9px" onclick="delDayItem(${it.id})">✕</button></div>`).join(''):`<div style="padding:20px;text-align:center" class="faint">Nothing scheduled.</div>`)+`</div>`;
  h+=`<div class="card" style="padding:14px;margin-top:10px"><div style="font-weight:600;font-size:13px;margin-bottom:8px">Add to ${esc(selLbl)}</div><div class="row" style="gap:8px;flex-wrap:wrap"><select id="calkind" style="padding:9px;border:1px solid var(--line2);border-radius:8px;background:var(--card);color:var(--ink);font-family:inherit">`+Object.keys(CAL_KINDS).map(k=>`<option value="${k}">${CAL_KINDS[k][1]}</option>`).join('')+`</select><input id="caltitle" placeholder="What's happening?" onkeydown="if(event.key==='Enter')calAdd('${sel}')" style="flex:1;min-width:150px;padding:9px 11px;border:1px solid var(--line2);border-radius:8px;background:var(--card);color:var(--ink);font-family:inherit"/></div><div class="row" style="gap:8px;margin-top:8px"><input id="caldetail" placeholder="Details (optional)" onkeydown="if(event.key==='Enter')calAdd('${sel}')" style="flex:1;padding:9px 11px;border:1px solid var(--line2);border-radius:8px;background:var(--card);color:var(--ink);font-family:inherit"/><button class="btn pri" style="width:auto" onclick="calAdd('${sel}')">Add</button></div><div class="faint" style="font-size:12px;margin-top:7px">A holiday auto-adds a prep &amp; staffing heads-up to the Lineup the day before and the day of.</div></div>`;
  v.innerHTML=h;
}
window.calMonth=function(n){ const now=new Date(); let ym=state.ctx.cal||(now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')); if(n===0){ ym=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0'); } else { const a=ym.split('-'); let y=+a[0],m=+a[1]; m+=n; if(m<1){m=12;y--;} if(m>12){m=1;y++;} ym=y+'-'+String(m).padStart(2,'0'); } state.ctx.cal=ym; state.ctx.day=null; vCalendar(document.getElementById('view')); };
window.calPick=function(iso){ state.ctx.day=iso; vCalendar(document.getElementById('view')); };
window.calAdd=async function(iso){ const kind=document.getElementById('calkind').value; const title=val('caltitle'); if(!title)return; const detail=val('caldetail'); await sb.from('day_items').insert({title,kind,detail,on_date:iso,created_by:state.user.id}); if(kind==='holiday'){ const d=new Date(iso+'T00:00:00'); const prev=new Date(d); prev.setDate(prev.getDate()-1); await sb.from('day_items').insert([{title:title+' tomorrow — prep extra & pull more product',kind:'note',detail:'Auto-added from calendar. Consider extra staff.',on_date:isoDate(prev),created_by:state.user.id},{title:title+' today — extra product & staffing',kind:'note',detail:'Auto-added from calendar.',on_date:iso,created_by:state.user.id}]); } state.ctx.day=iso; state.calCache=null; vCalendar(document.getElementById('view')); };

  v.innerHTML=`<div class="card" style="padding:22px;max-width:480px">

    <div style="margin-bottom:20px"><label style="display:block;font-size:13px;font-weight:600;margin-bottom:6px">Logo</label><div class="row" style="gap:12px">${s.logo_url?`<img src="${s.logo_url}" style="width:48px;height:48px;border-radius:10px;object-fit:cover;border:1px solid var(--line)"/>`:`<div style="width:48px;height:48px;border-radius:10px;background:var(--brand);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:22px">${esc((s.academy_name||'A').charAt(0).toUpperCase())}</div>`}<div><input id="setlogo" type="file" accept="image/*" style="font-size:13px"/><div class="faint" style="font-size:12px;margin-top:4px">PNG or JPG, square works best.</div></div></div></div>
    <div style="margin-bottom:20px"><label style="display:block;font-size:13px;font-weight:600;margin-bottom:6px">Team join code</label><input id="setjoin" type="text" value="${esc(s.join_code||'')}" placeholder="e.g. SIDEWALK" style="width:100%;max-width:220px;padding:10px 12px;border:1px solid var(--line2);border-radius:9px;font-size:14px;background:var(--card);color:var(--ink);font-family:inherit;letter-spacing:1px"/><div class="faint" style="font-size:12px;margin-top:6px">New team members enter this code to join — it keeps strangers out. Post it in the shop, or have them scan below.</div>${s.join_code?`<div style="margin-top:12px;display:flex;align-items:center;gap:14px"><img src="https://api.qrserver.com/v1/create-qr-code/?size=130x130&data=${encodeURIComponent(location.origin)}" style="width:104px;height:104px;border:1px solid var(--line);border-radius:10px;padding:6px;background:#fff"/><div class="muted" style="font-size:13px">Scan to open the academy on a phone, then sign up with code <b>${esc(s.join_code)}</b>.</div></div><div class="row" style="gap:8px;margin-top:12px"><button class="btn" style="width:auto" onclick="copyInvite('${esc(s.join_code)}')"><i class="ti ti-copy"></i> Copy invite</button><button class="btn" style="width:auto" onclick="shareInvite('${esc(s.join_code)}')"><i class="ti ti-send"></i> Text / Email</button></div>`:''}</div>
    <div class="row"><button class="btn pri" style="width:auto" onclick="saveSettings()">Save</button><span class="muted" id="setmsg" style="font-size:13px;margin-left:10px"></span></div>
  </div>
  <div class="card" style="padding:22px;max-width:480px;margin-top:16px"><div style="font-size:13px;font-weight:600;margin-bottom:6px">Stations &amp; skills</div><div class="faint" style="font-size:12px;margin-bottom:12px">Your restaurant's own roles — bake, register, bar, grill, drive-thru, whatever fits your shop. These become checkboxes on each person's profile, so the schedule only puts people where they're trained. Open and close are built in, so no need to add them.</div><div id="stationList" style="display:flex;flex-wrap:wrap;gap:7px;margin-bottom:10px"></div><div class="row" style="gap:8px"><input id="stationNew" type="text" placeholder="Add a station…" style="flex:1;padding:9px 11px;border:1px solid var(--line2);border-radius:8px;background:var(--card);color:var(--ink);font-family:inherit" onkeydown="if(event.key==='Enter'){addStation();event.preventDefault();}"/><button class="btn" style="width:auto" onclick="addStation()">Add</button></div><div class="row" style="margin-top:12px"><button class="btn pri" style="width:auto" onclick="saveStations()">Save stations</button><span class="muted" id="stmsg" style="font-size:13px;margin-left:10px"></span></div></div>
  <div class="card" style="padding:22px;max-width:520px;margin-top:16px"><div style="font-size:13px;font-weight:600;margin-bottom:6px">Access &amp; permissions</div><div class="faint" style="font-size:12px;margin-bottom:12px">Set the minimum role that can open each area. Owners always see everything. A person's role comes from their position on the team — Owner, Manager, Supervisor, or everyone else counts as Team member.</div><div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:13px"><thead><tr style="color:var(--muted)"><th style="text-align:left;padding:5px 8px">Area</th><th style="text-align:left;padding:5px 8px">Who can open it</th></tr></thead><tbody>${Object.keys(PERM_LABELS).map(pg=>`<tr style="border-top:1px solid var(--line)"><td style="padding:7px 8px;font-weight:600">${esc(PERM_LABELS[pg])}</td><td style="padding:7px 8px"><select class="permSel" data-pg="${pg}" style="padding:7px 9px;border:1px solid var(--line2);border-radius:8px;background:var(--card);color:var(--ink);font-family:inherit">${[5,4,3,2,1].map(r=>`<option value="${r}"${permOf(pg)===r?' selected':''}>${ROLE_LABELS[r]}${r===1?' (everyone)':(r===5?' only':' and up')}</option>`).join('')}</select></td></tr>`).join('')}</tbody></table></div><div style="border-top:1px solid var(--line);margin-top:14px;padding-top:14px"><div class="row" style="gap:10px;align-items:center;flex-wrap:wrap"><span style="font-size:13px;font-weight:600;flex:1;min-width:180px">Team members' schedule view</span><select id="teamViewSel" style="padding:7px 9px;border:1px solid var(--line2);border-radius:8px;background:var(--card);color:var(--ink);font-family:inherit"><option value="team"${(!state.perms||state.perms._teamView!=='own')?' selected':''}>Whole team schedule (standard)</option><option value="own"${(state.perms&&state.perms._teamView==='own')?' selected':''}>Only their own shifts</option></select></div><div class="faint" style="font-size:11.5px;margin-top:5px">Supervisors and up always see the whole roster. This only changes what a Team member sees.</div></div><div class="row" style="margin-top:14px"><button class="btn pri" style="width:auto" onclick="savePerms()">Save access levels</button><span class="muted" id="permsg" style="font-size:13px;margin-left:10px"></span></div></div>`;
  const ci=document.getElementById('setcolor'); if(ci) ci.addEventListener('input',e=>applyBrand(e.target.value));
  ((state.settings&&state.settings.stations&&state.settings.stations.length)?state.settings.stations:['Bake / Prep','Register','Bar / Espresso']).forEach(st=>_addStationPill(st));

function _addStationPill(v){ const list=document.getElementById('stationList'); if(!list||!v)return; const span=document.createElement('span'); span.setAttribute('data-st',v); span.style.cssText='background:var(--bg);border:1px solid var(--line2);border-radius:8px;padding:6px 10px;font-size:13px;display:inline-flex;align-items:center;gap:6px'; span.textContent=v; const x=document.createElement('span'); x.textContent='×'; x.style.cssText='cursor:pointer;color:#B32D2D;font-weight:700;margin-left:2px'; x.onclick=function(){ span.remove(); }; span.appendChild(x); list.appendChild(span); }
window.addStation=function(){ const inp=document.getElementById('stationNew'); const v=(inp.value||'').trim(); if(!v)return; if([...document.querySelectorAll('#stationList [data-st]')].some(e=>(e.getAttribute('data-st')||'').toLowerCase()===v.toLowerCase())){ inp.value=''; return; } _addStationPill(v); inp.value=''; inp.focus(); };
window.saveStations=async function(){ const arr=[...document.querySelectorAll('#stationList [data-st]')].map(e=>e.getAttribute('data-st')).filter(Boolean); await sb.from('day_items').delete().eq('kind','stations'); if(arr.length) await sb.from('day_items').insert({kind:'stations',title:'stations',on_date:null,detail:JSON.stringify(arr),created_by:state.user.id}); state.settings.stations=arr; const m=document.getElementById('stmsg'); if(m)m.textContent='Saved ✓'; };
window.savePerms=async function(){ const perms={}; document.querySelectorAll('.permSel').forEach(s=>{ perms[s.getAttribute('data-pg')]=+s.value; }); const tv=document.getElementById('teamViewSel'); if(tv) perms._teamView=tv.value; await sb.from('day_items').delete().eq('kind','perms'); await sb.from('day_items').insert({kind:'perms',title:'perms',on_date:null,detail:JSON.stringify(perms),created_by:state.user.id}); state.perms=perms; const m=document.getElementById('permsg'); if(m)m.textContent='Saved ✓ — updates as you move around'; };
function _inviteText(code){ return 'Join the Sidewalk Academy team: '+location.origin+' — sign up with the code '+code+'.'; }
window.copyInvite=function(code){ const t=_inviteText(code); const done=function(){ const m=document.getElementById('setmsg'); if(m){ m.textContent='Invite copied — paste it into a text or email.'; setTimeout(function(){m.textContent='';},3000);} }; if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(t).then(done,function(){ prompt('Copy this invite:', t); }); } else { prompt('Copy this invite:', t); } };
window.shareInvite=function(code){ const t=_inviteText(code); if(navigator.share){ navigator.share({title:'Sidewalk Academy', text:t}).catch(function(){}); } else { location.href='mailto:?subject='+encodeURIComponent('Join the Sidewalk Academy team')+'&body='+encodeURIComponent(t); } };
window.saveSettings=async function(){
  const name=(document.getElementById('setname').value||'').trim();
  const color=document.getElementById('setcolor').value;
  const msg=document.getElementById('setmsg'); if(msg)msg.textContent='Saving…';
  let logo_url=(state.settings&&state.settings.logo_url)||null;
  const f=document.getElementById('setlogo').files[0];
  if(f){ try{ logo_url=await fileToLogo(f); }catch(e){ if(msg) msg.textContent='Could not read that image — try a PNG or JPG.'; } }
  const join_code=val('setjoin');
  await sb.from('settings').update({academy_name:name, brand_color:color, logo_url, join_code, updated_at:new Date().toISOString()}).eq('id',1);
  state.settings={...state.settings, academy_name:name, brand_color:color, logo_url, join_code};
  applyBrand(color);
  if(msg)msg.textContent='Saved ✓';
  render();
};
function fileToLogo(file){ return new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>{ const img=new Image(); img.onload=()=>{ const max=256; let w=img.width,h=img.height; const sc=Math.min(1,max/Math.max(w,h)); w=Math.round(w*sc); h=Math.round(h*sc); const c=document.createElement('canvas'); c.width=w;c.height=h; c.getContext('2d').drawImage(img,0,0,w,h); res(c.toDataURL('image/png')); }; img.onerror=rej; img.src=r.result; }; r.onerror=rej; r.readAsDataURL(file); }); }
window.go=window.go||function(){};

async function boot(){
  await loadSettings();
  const { data:{ session } } = await sb.auth.getSession();
  if(!session){ state.user=null; render(); return; }
  state.user = session.user; state.busy=false;
  await ensureProfile();
  try{ await loadPositions(); }catch(e){}
  await loadAll();
  if(!applyHash()){
    let np='whiteboard',nc={};
    try{ const n=JSON.parse(localStorage.getItem('sw_nav')||'null'); if(n&&n.p){ np=n.p; nc=n.c||{}; } }catch(e){}
    if((np==='lesson'||np==='track') && !(nc.tid && state.tracks.find(t=>t.id===nc.tid))){ np='home'; nc={}; }
    state.page=np; state.ctx=nc;
  }
  render();
}
function applyHash(){ const m=(location.hash||'').match(/^#lesson\/([^/]+)\/(.+)$/); if(m){ const tid=decodeURIComponent(m[1]); if(state.tracks.find(t=>t.id===tid)){ state.page='lesson'; state.ctx={tid, lid:decodeURIComponent(m[2])}; return true; } } return false; }
window.addEventListener('hashchange',()=>{ if(state.user && applyHash()) render(); });
window.shareLesson=function(tid,lid){ const url=location.origin+location.pathname+'#lesson/'+encodeURIComponent(tid)+'/'+encodeURIComponent(lid); try{ navigator.clipboard&&navigator.clipboard.writeText(url); }catch(e){} const b=document.getElementById('sharebtn'); if(b){ b.textContent='Link copied ✓'; setTimeout(()=>{ b.innerHTML='<i class="ti ti-share"></i> Share'; },2000); } };
window.printLesson=function(lid){ let L=null,T=null; state.tracks.forEach(t=>(state.lessons[t.id]||[]).forEach(l=>{ if(l.id===lid){L=l;T=t;} })); if(!L)return; const name=(state.settings&&state.settings.academy_name)||'Academy'; const brand=(state.settings&&state.settings.brand_color)||'#4A9CAD'; const body=L.body&&L.body.trim()?richBody(L.body):('<p>'+esc(L.subtitle||'')+'</p>'); const w=window.open('','_blank'); if(!w)return; w.document.write(`<!doctype html><html><head><meta charset=utf-8><title>${esc(L.title)}</title><style>@page{margin:.7in}body{font-family:Helvetica,Arial,sans-serif;color:#1a1a1a;max-width:720px;margin:0 auto;line-height:1.65}h1{font-size:24px;margin:0 0 6px}.ey{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:${brand};font-weight:700}.hd{border-bottom:3px solid ${brand};padding-bottom:8px;margin-bottom:18px}blockquote{border-left:3px solid ${brand};margin:0 0 14px;padding:8px 16px;background:#f3f8f9;font-style:italic}.pbar{position:fixed;top:10px;right:10px}.pbar button{padding:8px 16px;border:1px solid ${brand};background:${brand};color:#fff;border-radius:6px;cursor:pointer}@media print{.pbar{display:none}}</style></head><body><div class=pbar><button onclick="window.print()">Print</button></div><div class=hd><div class=ey>${esc(name)} · ${esc(T.name)}</div></div><h1>${esc(L.title)}</h1>${L.subtitle?'<p style="font-style:italic;color:#666">'+esc(L.subtitle)+'</p>':''}${body}</body></html>`); w.document.close(); setTimeout(()=>{try{w.focus();w.print();}catch(e){}},400); };
window.go=go; window.markDone=markDone; window.undo=undo;
boot();
